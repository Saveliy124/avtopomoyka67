services:
  db:
    image: postgres:16-alpine
    container_name: carwash_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: carwash_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerasd232
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carwash_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: carwash_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:qwerasd232@db:5432/carwash_db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: carwash_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
